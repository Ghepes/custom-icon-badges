version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10 # <-- new automatic limit for open PRs
    labels:                      # <-- new automatic label for PRs
      - "dependencies"
    commit-message:
      prefix: "fix"
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
        - "minor"
        - "patch"
      dev-dependencies:
        dependency-type: "development"
        update-types:
        - "minor"
        - "patch"

  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10 # <-- new
    labels:                      # <-- new
      - "dependencies"
    commit-message:
      prefix: "fix"
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
        - "minor"
        - "patch"
      dev-dependencies:
        dependency-type: "development"
        update-types:
        - "minor"
        - "patch"
